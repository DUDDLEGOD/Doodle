<view id="calculator">
    <view id="theme-bar">
        <button id="btn-theme" class="btn btn-op">Theme</button>
    </view>

    <view id="display-area">
        <text id="expression">0</text>
        <text id="result">0</text>
    </view>

    <view id="btn-grid">
        <view id="row-top" class="btn-row">
            <button id="btn-c" class="btn btn-op">C</button>
            <button id="btn-paren-l" class="btn btn-op">(</button>
            <button id="btn-paren-r" class="btn btn-op">)</button>
            <button id="btn-div" class="btn btn-accent">/</button>
        </view>
        <view id="row-1" class="btn-row">
            <button id="btn-7" class="btn btn-num">7</button>
            <button id="btn-8" class="btn btn-num">8</button>
            <button id="btn-9" class="btn btn-num">9</button>
            <button id="btn-mul" class="btn btn-accent">x</button>
        </view>
        <view id="row-2" class="btn-row">
            <button id="btn-4" class="btn btn-num">4</button>
            <button id="btn-5" class="btn btn-num">5</button>
            <button id="btn-6" class="btn btn-num">6</button>
            <button id="btn-sub" class="btn btn-accent">-</button>
        </view>
        <view id="row-3" class="btn-row">
            <button id="btn-1" class="btn btn-num">1</button>
            <button id="btn-2" class="btn btn-num">2</button>
            <button id="btn-3" class="btn btn-num">3</button>
            <button id="btn-add" class="btn btn-accent">+</button>
        </view>
        <view id="row-bottom" class="btn-row">
            <button id="btn-sign" class="btn btn-op">+/-</button>
            <button id="btn-0" class="btn btn-num">0</button>
            <button id="btn-dot" class="btn btn-num">.</button>
            <button id="btn-eq" class="btn btn-equals">=</button>
        </view>
    </view>
</view>

<view class="stage">
    <view class="hud">
        <text id="score-text">SCORE: {{ score }}</text>
        <text id="lives-text">LIVES: {{ lives }}</text>
    </view>

    <view class="game-space" id="arena" camera="true">
        <!-- 4 rows of bricks, 8 bricks per row -->
        <view class="brick-row" id="row-1">
            <view id="b11" class="brick row1"></view>
            <view id="b12" class="brick row1"></view>
            <view id="b13" class="brick row1"></view>
            <view id="b14" class="brick row1"></view>
            <view id="b15" class="brick row1"></view>
            <view id="b16" class="brick row1"></view>
            <view id="b17" class="brick row1"></view>
            <view id="b18" class="brick row1"></view>
        </view>
        <view class="brick-row" id="row-2">
            <view id="b21" class="brick row2"></view>
            <view id="b22" class="brick row2"></view>
            <view id="b23" class="brick row2"></view>
            <view id="b24" class="brick row2"></view>
            <view id="b25" class="brick row2"></view>
            <view id="b26" class="brick row2"></view>
            <view id="b27" class="brick row2"></view>
            <view id="b28" class="brick row2"></view>
        </view>
        <view class="brick-row" id="row-3">
            <view id="b31" class="brick row3"></view>
            <view id="b32" class="brick row3"></view>
            <view id="b33" class="brick row3"></view>
            <view id="b34" class="brick row3"></view>
            <view id="b35" class="brick row3"></view>
            <view id="b36" class="brick row3"></view>
            <view id="b37" class="brick row3"></view>
            <view id="b38" class="brick row3"></view>
        </view>
        <view class="brick-row" id="row-4">
            <view id="b41" class="brick row4"></view>
            <view id="b42" class="brick row4"></view>
            <view id="b43" class="brick row4"></view>
            <view id="b44" class="brick row4"></view>
            <view id="b45" class="brick row4"></view>
            <view id="b46" class="brick row4"></view>
            <view id="b47" class="brick row4"></view>
            <view id="b48" class="brick row4"></view>
        </view>

        <circle id="ball" class="ball-entity" radius="8" color="#00ffcc" />
        <view id="paddle" class="paddle-entity"></view>

        <view id="game-over-screen" class="game-over-modal">
            <text id="game-over-text">GAME OVER</text>
            <button id="restart-btn" class="btn" onclick="restart_game">RESTART GAME</button>
        </view>
    </view>
</view>
